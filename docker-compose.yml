services:
  invoice-generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sparkle-invoice-generator
    ports:
      - "3000:3000"
    volumes:
      - ./invoices:/app/invoices
    environment:
      - NODE_ENV=production
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
    shm_size: "1gb"
    restart: unless-stopped